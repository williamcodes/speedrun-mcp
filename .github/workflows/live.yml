name: Live contract

# Read-only live tests against speedrun.com, on a schedule (and on demand), to
# catch API drift (schema / redirect / pagination changes) that the offline PR
# CI can't see. No API key is configured, so the authenticated tests skip and
# only public read paths run — no writes, no secrets.
on:
  schedule:
    - cron: "17 7 * * *" # daily, ~07:17 UTC
  workflow_dispatch: {}

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Live read-only contract tests
        run: pytest -m network -q
