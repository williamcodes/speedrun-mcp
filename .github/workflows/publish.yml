name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published. Uses PyPI Trusted
# Publishing (OIDC) — no API token/secret is stored anywhere. Configure the
# trusted publisher once at https://pypi.org/manage/account/publishing/ with:
#   project: speedrun-mcp · owner: williamcodes · repo: speedrun-mcp
#   workflow: publish.yml
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
